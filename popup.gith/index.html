<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            margin: 0; 
            background: black; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            cursor: pointer;
        }

        /* The GIF starts hidden */
        #coolGif {
            display: none;
            width: 100vw;
            height: 100vh;
            object-fit: contain; /* Change to 'cover' if you want it to fill the screen */
        }

        .click-prompt {
            color: white;
            font-family: 'Arial Black', sans-serif;
            font-size: 30px;
            position: absolute;
            z-index: 5;
        }
    </style>
</head>
<body onclick="startEverything()">

    <div id="prompt" class="click-prompt">CLICK TO START</div>

    <img id="coolGif" src="cool.gif">

    <audio id="myAudio" loop>
        <source src="sound.mp3" type="audio/mpeg">
    </audio>

    <script>
        const gif = document.getElementById('coolGif');
        const audio = document.getElementById('myAudio');
        const promptText = document.getElementById('prompt');
        let started = false;

        function startEverything() {
            if (started) return;
            started = true;

            // 1. Hide the "Click to Start" text
            promptText.style.display = "none";

            // 2. Show the GIF
            gif.style.display = "block";

            // 3. Setup Audio Context for that 400% volume boost
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaElementSource(audio);
            const gainNode = audioCtx.createGain();
            
            gainNode.gain.value = 4.0; // 400% Volume
            
            source.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            // 4. Play the looping audio
            audio.play();
        }
    </script>
</body>
</html>
