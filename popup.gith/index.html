<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: black; overflow: hidden; }
        #player { width: 100vw; height: 100vh; border: none; }
    </style>
</head>
<body>
    <div id="player"></div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: '5BLO9QAcgjs',
                playerVars: { 
                    'autoplay': 1, 
                    'controls': 0, 
                    'start': 1000,
                    'loop': 1,
                    'playlist': '5BLO9QAcgjs' // Required for looping
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            event.target.setVolume(100);
            event.target.playVideo();
            
            // LOUDNESS HACK (400% Boost)
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const iframe = document.getElementsByTagName('iframe')[0];
                const source = audioCtx.createMediaElementSource(iframe);
                const gainNode = audioCtx.createGain();
                
                gainNode.gain.value = 4.0; // 4x Volume
                
                source.connect(gainNode);
                gainNode.connect(audioCtx.destination);
            } catch(e) {
                console.log("Audio boost blocked until user clicks screen");
            }
        }
    </script>
</body>
</html>
