<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            margin: 0; 
            background: black; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            cursor: pointer;
        }

        #coolGif {
            display: none;
            width: 90vw;
            height: 90vh;
            object-fit: contain;
        }

        /* Intense shake animation */
        .shake {
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-5px, -8px) rotate(-5deg); }
            30% { transform: translate(8px, 5px) rotate(5deg); }
            50% { transform: translate(-10px, 10px) rotate(-1deg); }
            70% { transform: translate(10px, 4px) rotate(8deg); }
            90% { transform: translate(-3px, -5px) rotate(-5deg); }
            100% { transform: translate(1px, -2px) rotate(0deg); }
        }

        .click-prompt {
            color: white;
            font-family: 'Arial Black', sans-serif;
            font-size: 40px;
            text-align: center;
        }
    </style>
</head>
<body onclick="startEverything()">

    <div id="prompt" class="click-prompt">LOADING...<br>(CLICK TO START)</div>

    <img id="coolGif" src="cool.gif">

    <audio id="myAudio" loop>
        <source src="sound.mp3" type="audio/mpeg">
    </audio>

    <script>
        const gif = document.getElementById('coolGif');
        const audio = document.getElementById('myAudio');
        const promptText = document.getElementById('prompt');
        let started = false;

        function startEverything() {
            if (started) return;
            started = true;

            promptText.style.display = "none";
            gif.style.display = "block";
            gif.classList.add('shake'); // Starts the visual shake

            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaElementSource(audio);
