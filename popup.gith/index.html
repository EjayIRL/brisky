<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: black; overflow: hidden; font-family: Arial, sans-serif; }
        
        /* The Video Player */
        video { 
            width: 100vw; 
            height: 100vh; 
            object-fit: cover; 
        }

        /* The Centered Text */
        .overlay-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 40px;
            font-weight: bold;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.8);
            pointer-events: none; /* Let clicks pass through to video */
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="overlay-text">Youtube - @blake1h1</div>

    <video id="myVideo" autoplay loop playsinline crossorigin="anonymous">
        <source src="https://brisky.infinityfree.me/Lmaoooooo.mp4" type="video/mp4">
    </video>

    <script>
        const video = document.getElementById('myVideo');

        // LOUDNESS HACK (400% Volume Boost)
        window.onclick = function() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaElementSource(video);
                const gainNode = audioCtx.createGain();
                
                gainNode.gain.value = 4.0; // 4x Volume
                
                source.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                video.play();
                console.log("Audio Boosted!");
            } catch(e) {
                console.log("Audio boost failed - interaction needed");
            }
        };
    </script>
</body>
</html>
